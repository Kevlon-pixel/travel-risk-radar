services:
  api:
    build:
      context: .
      args:
        TARGET: api
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_PORT: ${APP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      DATABASE_URL: postgres://${POSTGRES_USER:-travel_risk}:${POSTGRES_PASSWORD:-travel_risk}@postgres:5432/${POSTGRES_DB:-travel_risk_radar}?sslmode=disable
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${APP_PORT:-8080}/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  worker:
    build:
      context: .
      args:
        TARGET: worker
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      DATABASE_URL: postgres://${POSTGRES_USER:-travel_risk}:${POSTGRES_PASSWORD:-travel_risk}@postgres:5432/${POSTGRES_DB:-travel_risk_radar}?sslmode=disable
      WORKER_INTERVAL: ${WORKER_INTERVAL:-30m}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_risk_radar}
      POSTGRES_USER: ${POSTGRES_USER:-travel_risk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travel_risk}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travel_risk} -d ${POSTGRES_DB:-travel_risk_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
